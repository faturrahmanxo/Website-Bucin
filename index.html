<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Lucu 🌸</title>

    <!-- Mengambil Font Lucu dari Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- favicon -->
    <link rel="icon" type="image/x-icon" href="imgs/iconWeb.jpg" />

    <!-- Menggunakan Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      /* Pengaturan Font Utama & Kursor Custom Bintang */
      body {
        font-family: "Fredoka", sans-serif;
        background-color: #fce7f3;
        background-image: radial-gradient(#fbcfe8 2px, transparent 2px);
        background-size: 30px 30px;
        cursor:
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='48' viewport='0 0 100 100' style='font-size:24px;'><text y='50%'>✨</text></svg>")
            16 0,
          auto !important;
      }

      /* Terapkan kursor custom ke elemen yang bisa diklik juga */
      button,
      input,
      .cursor-pointer {
        cursor:
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='48' viewport='0 0 100 100' style='font-size:24px;'><text y='50%'>💖</text></svg>")
            16 0,
          pointer !important;
      }

      /* Transisi halus saat pergantian halaman */
      .fade-in {
        animation: fadeIn 0.8s ease-in-out forwards;
      }

      .fade-out {
        animation: fadeOut 0.5s ease-in-out forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeOut {
        from {
          opacity: 1;
          transform: translateY(0);
        }
        to {
          opacity: 0;
          transform: translateY(-10px);
        }
      }

      /* Animasi Hujan Hati / Bunga */
      .falling-item {
        position: fixed;
        top: -10vh;
        font-size: 1.5rem;
        animation: fall linear forwards;
        z-index: 1;
        pointer-events: none;
        user-select: none;
      }

      @keyframes fall {
        to {
          transform: translateY(110vh) rotate(360deg);
        }
      }

      /* Animasi piringan hitam */
      .spin-record {
        animation: spinRecord 4s linear infinite;
        animation-play-state: paused;
      }
      .spin-record.playing {
        animation-play-state: running;
      }
      @keyframes spinRecord {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* Menyembunyikan scrollbar agar lebih rapi */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #fce7f3;
      }
      ::-webkit-scrollbar-thumb {
        background: #f472b6;
        border-radius: 10px;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-4 relative overflow-x-hidden"
  >
    <!-- ==================== PAGE 1: LOGIN ==================== -->
    <div
      id="page-login"
      class="bg-white/90 backdrop-blur-sm p-8 rounded-[30px] shadow-xl border-4 border-pink-200 max-w-sm w-full text-center relative z-20 fade-in"
    >
      <div class="text-5xl mb-4">🎀</div>
      <h1 id="greeting-text" class="text-2xl font-semibold text-pink-600 mb-6">
        Masuk Dulu Yuk!
      </h1>

      <div class="space-y-4">
        <div>
          <input
            type="text"
            id="username"
            placeholder="Username"
            class="w-full px-5 py-3 rounded-2xl bg-pink-50 border-2 border-pink-200 text-pink-700 outline-none focus:border-pink-400 focus:bg-white transition-all placeholder-pink-300"
          />
        </div>
        <div>
          <input
            type="password"
            id="password"
            placeholder="Password"
            class="w-full px-5 py-3 rounded-2xl bg-pink-50 border-2 border-pink-200 text-pink-700 outline-none focus:border-pink-400 focus:bg-white transition-all placeholder-pink-300"
          />
        </div>
        <p id="error-msg" class="text-red-400 text-sm hidden font-medium">
          Ups, username atau password salah! 🥺
        </p>

        <div class="flex gap-2 mt-4 relative w-full h-[52px]">
          <button
            id="btn-runaway"
            onmouseover="runAway(this)"
            onclick="runAway(this)"
            class="w-1/2 bg-gray-200 text-gray-500 font-medium text-lg rounded-2xl transition-all duration-200 absolute left-0 h-full z-30"
          >
            Gak Mau 😝
          </button>
          <button
            id="btn-login"
            onclick="checkLogin()"
            class="w-1/2 bg-pink-400 hover:bg-pink-500 text-white font-medium text-lg rounded-2xl shadow-md hover:shadow-lg transition-all active:scale-95 absolute right-0 h-full z-20"
          >
            Buka Kunci 💖
          </button>
        </div>
      </div>
    </div>

    <!-- ==================== PAGE 2: GALLERY ==================== -->
    <div
      id="page-gallery"
      class="hidden max-w-5xl w-full bg-white/95 backdrop-blur-md p-6 sm:p-10 rounded-[40px] shadow-2xl border-4 border-pink-200 relative z-20 fade-in"
    >
      <div class="text-center mb-8">
        <h2 class="text-3xl sm:text-4xl font-semibold text-pink-500">
          ✨ Koleksi Foto Kita ✨
        </h2>
        <p class="text-pink-400 mt-2">Klik kotaknya untuk membuka rahasia!</p>
      </div>

      <!-- Grid Foto (10 kotak per slide) -->
      <div
        id="photo-grid"
        class="grid grid-cols-2 md:grid-cols-5 gap-3 sm:gap-5"
      >
        <!-- Foto akan di-generate oleh JavaScript di sini -->
      </div>

      <!-- Navigasi Slide di bawah -->
      <div class="mt-8 flex justify-center items-center gap-4">
        <div class="flex gap-2 items-center" id="dots-container">
          <button
            onclick="goToSlide(0)"
            class="dot w-6 h-3 rounded-full bg-pink-400 transition-all duration-300"
          ></button>
          <button
            onclick="goToSlide(1)"
            class="dot w-3 h-3 rounded-full bg-pink-200 hover:bg-pink-300 transition-all duration-300"
          ></button>
          <button
            onclick="goToSlide(2)"
            class="dot w-3 h-3 rounded-full bg-pink-200 hover:bg-pink-300 transition-all duration-300"
          ></button>
        </div>

        <button
          onclick="nextSlide()"
          class="bg-pink-100 hover:bg-pink-200 text-pink-600 px-4 py-1.5 rounded-full text-sm font-medium border border-pink-300 transition-all active:scale-90 flex items-center gap-1"
        >
          Next <span class="text-xs">⏭</span>
        </button>
      </div>
    </div>

    <!-- ==================== POP-UP MODAL PESAN RAHASIA ==================== -->
    <div
      id="photo-modal"
      class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-white/60 backdrop-blur-sm transition-opacity"
    >
      <div
        class="bg-white p-6 rounded-[30px] shadow-2xl border-4 border-pink-300 max-w-sm w-full relative transform scale-95 transition-transform duration-300"
        id="modal-content"
      >
        <button
          onclick="closeModal()"
          class="absolute -top-3 -right-3 bg-pink-500 text-white w-10 h-10 rounded-full font-bold shadow-md hover:bg-pink-600 text-xl border-2 border-white"
        >
          ×
        </button>
        <img
          id="modal-img"
          src=""
          class="w-full aspect-square object-cover rounded-[20px] mb-4 border-2 border-pink-100"
        />
        <p
          id="modal-text"
          class="text-center text-pink-600 font-medium text-lg leading-tight"
        >
          Pesan rahasia di sini!
        </p>
      </div>
    </div>

    <!-- ==================== CUSTOM MUSIC PLAYER ==================== -->
    <div
      onclick="toggleAudio()"
      class="fixed bottom-4 right-4 z-50 bg-white/95 backdrop-blur-sm p-2 pr-5 rounded-full shadow-xl border-2 border-pink-200 flex items-center gap-3 hover:scale-105 transition-transform cursor-pointer"
      title="Klik untuk memutar/menjeda lagu"
    >
      <!-- Piring Hitam -->
      <div
        id="record-disk"
        class="spin-record w-12 h-12 rounded-full border-4 border-gray-800 bg-gray-900 flex items-center justify-center relative shadow-inner"
      >

          class="w-4 h-4 bg-pink-400 rounded-full border border-gray-600 z-10 flex items-center justify-center"
        >
          <div class="w-1 h-1 bg-white rounded-full"></div>
        </div>
        <div
          class="absolute inset-1 rounded-full border border-gray-700/50"
        ></div>
        <div
          class="absolute inset-2 rounded-full border border-gray-700/50"
        ></div>
      </div>

      <div class="flex flex-col">
        <p class="text-sm font-semibold text-pink-600 leading-none mb-1">
          Sedia Aku Sebelum Hujan
        </p>
        <p class="text-[10px] text-pink-400 leading-none" id="audio-status">
          Ketuk untuk memutar 🎵
        </p>
      </div>

      <audio id="my-audio" loop>
        <source src="lagu/sedia-aku-sebelum-hujan.m4a" type="audio/mpeg" />
      </audio>
    </div>

    <!-- ==================== JAVASCRIPT ==================== -->

        const greetingEl = document.getElementById("greeting-text");
        if (hour >= 4 && hour < 11)
          greetingEl.innerText = "Selamat Pagi Sayang! ☀️";
        else if (hour >= 11 && hour < 15)
          greetingEl.innerText = "Siang-siang kangen ya? 🌤️";
        else if (hour >= 15 && hour < 18)
          greetingEl.innerText = "Selamat Sore Cintaku! 🌅";
        else greetingEl.innerText = "Udah Malam, Kangen Ya? 🌙";

        // Mulai efek hujan
        setInterval(createFallingItem, 600);
      };

      let currentSlide = 0;

      // --- FUNGSI LOGIN ---
      function checkLogin() {
        const usn = document.getElementById("username").value;
        const pw = document.getElementById("password").value;
        const errorMsg = document.getElementById("error-msg");
        const pageLogin = document.getElementById("page-login");
        const pageGallery = document.getElementById("page-gallery");

        if (usn === USERNAME_BENAR && pw === PASSWORD_BENAR) {
          errorMsg.classList.add("hidden");
          pageLogin.classList.remove("fade-in");
          pageLogin.classList.add("fade-out");

          setTimeout(() => {
            pageLogin.classList.add("hidden");
            pageGallery.classList.remove("hidden");
            renderSlide(currentSlide);
          }, 500);
        } else {
          errorMsg.classList.remove("hidden");
        }
      }

      // --- FUNGSI TOMBOL KABUR ---
      function runAway(btn) {
        btn.style.position = "fixed";
        const maxX = window.innerWidth - btn.offsetWidth - 20;
        const maxY = window.innerHeight - btn.offsetHeight - 20;

        const randomX = Math.max(20, Math.floor(Math.random() * maxX));
        const randomY = Math.max(20, Math.floor(Math.random() * maxY));

        btn.style.left = randomX + "px";
        btn.style.top = randomY + "px";

        document.getElementById("btn-login").style.width = "100%";
      }

      // --- FUNGSI RENDER GALERI ---
      function renderSlide(slideIndex) {
        const grid = document.getElementById("photo-grid");
        grid.innerHTML = "";

        const startIndex = slideIndex * 10;
        const endIndex = startIndex + 10;
        const slideData = galleryData.slice(startIndex, endIndex);

        slideData.forEach((data, index) => {
          // Menghitung index sebenarnya berdasarkan urutan total (0 sampai 29)
          const globalIndex = startIndex + index;

          const photoCard = `
                    <div onclick="openModal(${globalIndex})" class="relative w-full aspect-square rounded-[20px] overflow-hidden group shadow-sm border-[3px] border-pink-200 cursor-pointer bg-pink-50">
                        <img src="${data.img}" alt="Foto" class="w-full h-full object-cover transition-transform duration-700 ease-in-out group-hover:scale-110">
                        
                        <div class="absolute inset-0 bg-pink-300 transition-opacity duration-500 ease-in-out group-hover:opacity-0 flex items-center justify-center">
                            <span class="text-white text-3xl sm:text-4xl drop-shadow-md">💖</span>
                        </div>
                    </div>
                `;
          grid.innerHTML += photoCard;
        });

        updateDots();
      }

      // --- FUNGSI POP-UP MODAL (PESAN RAHASIA) ---
      function openModal(dataIndex) {
        const modal = document.getElementById("photo-modal");
        const modalImg = document.getElementById("modal-img");
        const modalText = document.getElementById("modal-text");
        const content = document.getElementById("modal-content");

        // Ambil data yang sesuai dengan foto yang diklik
        const targetData = galleryData[dataIndex];

        modalImg.src = targetData.img;
        modalText.innerText = targetData.msg;

        modal.classList.remove("hidden");
        setTimeout(() => {
          content.classList.remove("scale-95");
          content.classList.add("scale-100");
        }, 10);
      }

      function closeModal() {
        const modal = document.getElementById("photo-modal");
        const content = document.getElementById("modal-content");

        content.classList.remove("scale-100");
        content.classList.add("scale-95");

        setTimeout(() => {
          modal.classList.add("hidden");
        }, 300);
      }

      // --- FUNGSI NAVIGASI SLIDE ---
      function updateDots() {
        const dots = document.querySelectorAll(".dot");
        dots.forEach((dot, index) => {
          if (index === currentSlide) {
            dot.className =
              "dot w-6 h-3 rounded-full bg-pink-400 transition-all duration-300";
          } else {
            dot.className =
              "dot w-3 h-3 rounded-full bg-pink-200 hover:bg-pink-300 transition-all duration-300 cursor-pointer";
          }
        });
      }

      function goToSlide(index) {
        currentSlide = index;
        const grid = document.getElementById("photo-grid");
        grid.style.opacity = 0;

        setTimeout(() => {
          renderSlide(currentSlide);
          grid.style.transition = "opacity 0.4s";
          grid.style.opacity = 1;
        }, 200);
      }

      function nextSlide() {
        currentSlide = (currentSlide + 1) % 3;
        goToSlide(currentSlide);
      }

      // --- FUNGSI PEMUTAR MUSIK ---
      function toggleAudio() {
        const audio = document.getElementById("my-audio");
        const disk = document.getElementById("record-disk");
        const statusText = document.getElementById("audio-status");

        if (audio.paused) {
          audio.play();
          disk.classList.add("playing");
          statusText.innerText = "Sedang diputar 🎶";
        } else {
          audio.pause();
          disk.classList.remove("playing");
          statusText.innerText = "Dijeda ⏸️";
        }
      }

      document.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          if (
            !document.getElementById("page-login").classList.contains("hidden")
          ) {
            checkLogin();
          }
        }
      });
